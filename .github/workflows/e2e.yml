# Phase 3 pipeline order: typecheck → test:unit → E2E (Playwright)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mukwano
          POSTGRES_PASSWORD: mukwano
          POSTGRES_DB: mukwano
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mukwano -d mukwano"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mukwano:mukwano@localhost:5432/mukwano
      JWT_SECRET: ci-e2e-jwt-secret-must-be-at-least-32-chars
      REFRESH_TOKEN_SECRET: ci-e2e-refresh-secret-at-least-32-chars
      CI: "true"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate & migrate
        working-directory: packages/api
        run: npx prisma generate && npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

  playwright:
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mukwano
          POSTGRES_PASSWORD: mukwano
          POSTGRES_DB: mukwano
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mukwano -d mukwano"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mukwano:mukwano@localhost:5432/mukwano
      JWT_SECRET: ci-e2e-jwt-secret-must-be-at-least-32-chars
      REFRESH_TOKEN_SECRET: ci-e2e-refresh-secret-at-least-32-chars
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate & migrate deploy
        working-directory: packages/api
        run: npx prisma generate && npx prisma migrate deploy

      - name: Build API
        working-directory: packages/api
        run: npm run build

      - name: Build web
        working-directory: packages/web
        env:
          VITE_API_BASE_URL: ""
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: packages/e2e
        run: npx playwright install chromium --with-deps

      - name: Run Playwright
        working-directory: packages/e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7
