<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1e42;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#060d1f;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#f0a500;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f0a500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060d1f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0a500;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Radial glow -->
  <ellipse cx="600" cy="315" rx="500" ry="350" fill="url(#glow)" />

  <!-- Decorative orbit rings -->
  <circle cx="600" cy="315" r="260" fill="none" stroke="rgba(240,165,0,0.06)" stroke-width="1" />
  <circle cx="600" cy="315" r="310" fill="none" stroke="rgba(240,165,0,0.04)" stroke-width="1" />
  <circle cx="600" cy="315" r="200" fill="none" stroke="rgba(240,165,0,0.08)" stroke-width="1" />

  <!-- Corner accents -->
  <line x1="0" y1="0" x2="120" y2="0" stroke="rgba(240,165,0,0.3)" stroke-width="1" />
  <line x1="0" y1="0" x2="0" y2="80" stroke="rgba(240,165,0,0.3)" stroke-width="1" />
  <line x1="1200" y1="0" x2="1080" y2="0" stroke="rgba(240,165,0,0.3)" stroke-width="1" />
  <line x1="1200" y1="0" x2="1200" y2="80" stroke="rgba(240,165,0,0.3)" stroke-width="1" />
  <line x1="0" y1="630" x2="120" y2="630" stroke="rgba(240,165,0,0.3)" stroke-width="1" />
  <line x1="0" y1="630" x2="0" y2="550" stroke="rgba(240,165,0,0.3)" stroke-width="1" />
  <line x1="1200" y1="630" x2="1080" y2="630" stroke="rgba(240,165,0,0.3)" stroke-width="1" />
  <line x1="1200" y1="630" x2="1200" y2="550" stroke="rgba(240,165,0,0.3)" stroke-width="1" />

  <!-- Main title -->
  <text
    x="600"
    y="260"
    font-family="Outfit, Arial, sans-serif"
    font-size="96"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="8"
  >Mukwano</text>

  <!-- Gold accent line -->
  <rect x="380" y="290" width="440" height="2" fill="url(#gold-line)" />

  <!-- Tagline -->
  <text
    x="600"
    y="360"
    font-family="Outfit, Arial, sans-serif"
    font-size="32"
    font-weight="400"
    fill="#f0a500"
    text-anchor="middle"
    letter-spacing="3"
  >Invest together. Build home.</text>

  <!-- Sub-tagline -->
  <text
    x="600"
    y="420"
    font-family="Outfit, Arial, sans-serif"
    font-size="18"
    font-weight="300"
    fill="rgba(122,149,196,0.9)"
    text-anchor="middle"
    letter-spacing="2"
  >Governance-first platform for diaspora communities</text>

  <!-- Bottom domain label -->
  <text
    x="600"
    y="560"
    font-family="Outfit, Arial, sans-serif"
    font-size="14"
    font-weight="400"
    fill="rgba(240,165,0,0.5)"
    text-anchor="middle"
    letter-spacing="3"
  >mukwano.app</text>
</svg>
